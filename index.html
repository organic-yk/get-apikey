<!DOCTYPE html>
<html>

<head>
    <title>Get API Key for CATSA</title>
</head>

<body>
    <h2>Get API Key for CATSA</h2>

    <label>Passphrase:</label><br>
    <input type="password" id="pass"><br><br>

    <label>Serial Number:</label><br>
    <input type="text" id="serial"><br><br>

    <button onclick="sendData()">Submit</button>



    <script>
        async function sendData() {
            const pass = document.getElementById("pass").value;
            const serial = document.getElementById("serial").value;

            // 👉 나중에 Go 서버 주소로 변경
            const response = await fetch("https://get-apikey.onrender.com/submit", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: `passphrase=${pass}&serial=${serial}`
            });

            const data = await response.json();
            document.getElementById("apikey").innerText = data.apiKey;
            document.getElementById("sitekey").innerText = data.siteKey;
        }
    </script>

    <h2>Result</h2>
    <p><b>APIKey:</b> <h3 id="apikey"></h3> </p>
	<p><b>SITEKey:</b> <h3 id="sitekey"></h3> </p>
</body>

</html>
